<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Facebook – Вход</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
    
    <section class="info">
        <h1 class="logo">facebook</h1>
        <p>
            Facebook помогает вам всегда оставаться на связи
            и общаться со своими знакомыми.
        </p>
    </section>

 
    <section class="login-card">
        <form>
            <label for="email" class="visually-hidden">Электронный адрес или телефон</label>
            <input
                type="text"
                id="email"
                name="email"
                placeholder="Электронный адрес или номер телефона"
                required
            >

            <label for="password" class="visually-hidden">Пароль</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Пароль"
                required
            >

            <button type="submit" class="login-btn">Вход</button>

            <a href="#" class="forgot">Забыли пароль?</a>

            <hr>

            <button type="button" class="create-btn">
                Создать новый аккаунт
            </button>
        </form>

        <p class="create-page">
            <a href="#">Создать Страницу</a> знаменитости, музыкальной группы или компании.
        </p>
    </section>
</main>

</body>
</html>
