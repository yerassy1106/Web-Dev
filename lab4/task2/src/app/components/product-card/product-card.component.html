<div class="card">
  <div class="image-container">
    <button class="nav" (click)="prevImage()">‹</button>

    @if (product()) {
  <img
    [src]="product()!.images[currentImageIndex]"
    alt="product"
  />
}

    <button class="nav" (click)="nextImage()">›</button>
  </div>

  <h3>{{ product()?.name }}</h3>
  <p>{{ product()?.description }}</p>

  <p class="price">{{ product()?.price }} ₸</p>
  <p class="rating">Rating: {{ product()?.rating }}</p>

  <div class="actions">
    <a [href]="product()?.link" target="_blank">Open in Kaspi</a>
    <button (click)="shareWhatsApp()">WhatsApp</button>
    <button (click)="shareTelegram()">Telegram</button>
  </div>
</div>
